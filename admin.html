<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Juiz - U19</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <div class="header-container">
        <img src="img/fira_logo.png" alt="Fira" class="header-logo">
        <h1>Painel do Juiz</h1>
        <img src="img/robotec_logo.png" alt="Robotec" class="header-logo">
    </div>

    <div class="section">
        <span class="section-title">Identificação</span>
        <div class="row">
            <label>Equipe:</label>
            <select id="equipe-select" style="padding: 8px; border-radius: 8px; width: 70%;">
                <option value="VIVERTEC">VIVERTEC</option>
                <option value="FLASHLIGHT">FLASHLIGHT</option>
                <option value="MARVELTEC U-19">MARVELTEC U-19</option>
                <option value="TECFLOR">TECFLOR</option>
                <option value="ROBOHERO">ROBOHERO</option>
                <option value="MASERATI">MASERATI</option>
                <option value="ROBO COC">ROBO COC</option>
                <option value="ROBOTEC-PED">ROBOTEC-PED</option>
                <option value="ARTHEMIS">ARTHEMIS</option>
                <option value="FÚRIA">FÚRIA</option>
                <option value="ENGREBOT">ENGREBOT</option>
            </select>
        </div>
    </div>

    <div class="section">
        <span class="section-title">Missões e Navegação</span>
        <div class="row"><label>Início no robô (+50)</label><input type="checkbox" id="item1" onchange="calculate()"></div>
        <div class="row"><label>Coleta autônoma (+80)</label><input type="checkbox" id="item2" onchange="calculate()"></div>
        <div class="row">
            <label>Curvas (+20 cada)</label>
            <div class="counter">
                <button class="btn-counter" onclick="updateCurvas(-1)">-</button>
                <span id="curvas-val">0</span>
                <button class="btn-counter" onclick="updateCurvas(1)">+</button>
            </div>
        </div>
    </div>

    <div class="section">
        <span class="section-title">Local de Depósito</span>
        <div class="radio-group">
            <label class="radio-option"><input type="radio" name="deposito" value="200" onchange="calculate()"> L2 Azul - Total [200]</label>
            <label class="radio-option"><input type="radio" name="deposito" value="100" onchange="calculate()"> L2 Azul - Parcial [100]</label>
            <label class="radio-option"><input type="radio" name="deposito" value="100" onchange="calculate()"> L1 Vermelho - Total [100]</label>
            <label class="radio-option"><input type="radio" name="deposito" value="80" onchange="calculate()"> Fora (Alcançou) [80]</label>
            <label class="radio-option"><input type="radio" name="deposito" value="0" onchange="calculate()" checked> Não entregue [0]</label>
        </div>
    </div>

    <div class="section">
        <span class="section-title">Bônus e Finalização</span>
        <div class="row">
            <label>Tempo (seg):</label>
            <input type="number" id="tempo-input" style="width: 80px; padding: 5px;">
        </div>
    </div>

    <div class="total-box">
        PONTUAÇÃO ATUAL
        <span id="total" class="total-points">0</span>
    </div>

    <button onclick="salvarPontuacao()" class="btn-save" style="width:100%; padding:15px; background:#16a34a; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer; margin-top:10px;">REGISTRAR PONTUAÇÃO</button>
    <button onclick="resetForm()" class="btn-reset">Limpar Campos</button>

    <hr style="margin: 30px 0; border: 0; border-top: 1px solid #ccc;">

    <h2 style="text-align: center; font-size: 1.2rem;">Classificação em Tempo Real</h2>
    <table style="font-size: 0.9rem;">
        <thead>
            <tr class="table-header">
                <th>Pos</th>
                <th>Equipe</th>
                <th>Pts</th>
                <th>Tempo</th>
            </tr>
        </thead>
        <tbody id="ranking-body">
            </tbody>
    </table>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
<script src="js/script.js"></script>
<script>window.onload = carregarFirebase;</script>
</body>
</html>
