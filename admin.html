<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Juiz - Fira Brasil</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body>

<body data-page="admin">
<div id="loginGate" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; color: white; font-family: sans-serif;">
    <div style="background: white; padding: 30px; border-radius: 12px; display: flex; flex-direction: column; width: 300px; color: #333; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
        <h2 style="text-align: center; margin-bottom: 20px; color: #e53935;">Acesso Restrito</h2>
        <label>Usuário:</label>
        <input type="text" id="user" style="padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px;">
        <label>Senha:</label>
        <input type="password" id="pass" style="padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 5px;">
        <button onclick="verificarLogin()" style="background: #e53935; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold;">ENTRAR</button>
        <p id="erroLogin" style="color: red; font-size: 12px; margin-top: 10px; display: none; text-align: center;">Usuário ou senha incorretos!</p>
    </div>
</div>
<div class="container">

<div class="main-wrapper">
    <div class="card-juiz">
        <div class="header-card">
            <img src="img/fira_logo.png" alt="Fira Brasil">
            <h1>Painel do Juiz</h1>
            <img src="img/robotec_logo.png" alt="Robotec" style="height: 40px;">
        </div>

        <div class="section-form">
            <label class="section-title">Identificação</label>
            <div class="form-group">
                <label>Equipe:</label>
                <select id="equipe-select">
                    </select>
            </div>
        </div>

        <div class="section-form">
            <label class="section-title">Missões</label>
            <div class="check-group"><label>Material no robô (+50)</label><input type="checkbox" id="item1" onchange="calculate()"></div>
            <div class="check-group"><label>Coleta autônoma (+80)</label><input type="checkbox" id="item2" onchange="calculate()"></div>
            <div class="counter-group">
                <label>Curvas (+20 cada)</label>
                <div class="counter-controls">
                    <button class="btn-counter" onclick="updateCurvas(-1)">-</button>
                    <span id="curvas-val">0</span>
                    <button class="btn-counter" onclick="updateCurvas(1)">+</button>
                </div>
            </div>
        </div>
        <div class="section-form">
            <label class="section-title">Local de Depósito</label>
            <div class="radio-group">
                <label><input type="radio" name="deposito" value="200" onchange="calculate()"> L2 Azul - Total [200]</label>
                <label><input type="radio" name="deposito" value="100" onchange="calculate()"> L2 Azul - Parcial [100]</label>
                <label><input type="radio" name="deposito" value="100" onchange="calculate()"> L1 Vermelho - Total [100]</label>
                <label><input type="radio" name="deposito" value="80" onchange="calculate()"> Fora (Alcançou) [80]</label>
                <label><input type="radio" name="deposito" value="0" onchange="calculate()" checked> Não entregue [0]</label>
            </div>
            <div class="form-group-alert" style="margin-top: 15px;">
                <label>Tempo (seg):</label>
                <input type="number" id="tempo-input" placeholder="Obrigatório">
            </div>
        </div>

        <div class="total-bar">
            <div class="total-box">
                <span class="label-total">PONTOS</span>
                <span id="total" class="pts-total">0</span>
            </div>
            <button onclick="salvarPontuacao()" class="btn-registrar">REGISTRAR</button>
        </div>
        <button onclick="resetForm()" class="btn-limpar">Limpar Campos</button>
    </div>

    <div class="card-ranking">
        <h2>Classificação U19</h2>
        <table class="table-admin">
            <thead>
                <tr>
                    <th>Pos</th>
                    <th>Equipe</th>
                    <th>Pts</th>
                    <th>Tempo</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody id="ranking-body">
                </tbody>
        </table>
        <button onclick="zerarRanking()" class="btn-zerar">ZERAR TODA A COMPETIÇÃO</button>
    </div>
</div>

<script src="js/script.js"></script>
<script>
    // Inicialização ao carregar a página
    window.onload = function() {
        carregarFirebase(); // Isso vai carregar o ranking e popular o select
    };
</script>
</body>
</html>
