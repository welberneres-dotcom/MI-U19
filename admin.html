<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Robótica - Juiz</title>
    <link rel="shortcut icon" href="img/LOGO.ico">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <div class="header-container">
        <img src="img/fira_logo.png" alt="Fira Brasil" class="header-logo">
        <h1>Painel do Juiz</h1>
        <img src="img/robotec_logo.png" alt="Robotec" class="header-logo">
    </div>

    <div class="section">
        <span class="section-title">Identificação</span>
        <div class="row">
            <label>Equipe:</label>
            <select id="equipe-select" style="padding: 8px; border-radius: 8px; border: 1px solid #cbd5e1; width: 60%;">
                <option value="VIVERTEC">VIVERTEC</option>
                <option value="FLASHLIGHT">FLASHLIGHT</option>
                <option value="MARVELTEC U-19">MARVELTEC U-19</option>
                <option value="TECFLOR">TECFLOR</option>
                <option value="ROBOHERO">ROBOHERO</option>
                <option value="MASERATI">MASERATI</option>
                <option value="ROBO COC">ROBO COC</option>
                <option value="ROBOTEC-PED">ROBOTEC-PED</option>
                <option value="ARTHEMIS">ARTHEMIS</option>
                <option value="FÚRIA">FÚRIA</option>
                <option value="ENGREBOT">ENGREBOT</option>
            </select>
        </div>
    </div>

    <div class="section">
        <span class="section-title">Missões Iniciais</span>
        <div class="row">
            <label>Material inicia no robô (+50)</label>
            <input type="checkbox" id="item1" onchange="calculate()">
        </div>
        <div class="row">
            <label>Coleta autônoma (+80)</label>
            <input type="checkbox" id="item2" onchange="calculate()">
        </div>
    </div>

    <div class="section">
        <span class="section-title">Navegação (Curvas 90º)</span>
        <div class="row">
            <label>Curvas superadas (+20 cada)</label>
            <div class="counter">
                <button class="btn-counter" onclick="updateCurvas(-1)">-</button>
                <span id="curvas-val" style="font-weight: bold;">0</span>
                <button class="btn-counter" onclick="updateCurvas(1)">+</button>
            </div>
        </div>
    </div>

    <div class="section">
        <span class="section-title">Local de Depósito</span>
        <div class="radio-group">
            <label class="radio-option"><input type="radio" name="deposito" value="200" onchange="calculate()"> Local 2 (Azul) - Total [200]</label>
            <label class="radio-option"><input type="radio" name="deposito" value="100" onchange="calculate()"> Local 2 (Azul) - Parcial [100]</label>
            <label class="radio-option"><input type="radio" name="deposito" value="100" onchange="calculate()"> Local 1 (Vermelho) - Total [100]</label>
            <label class="radio-option"><input type="radio" name="deposito" value="50" onchange="calculate()"> Local 1 (Vermelho) - Parcial [50]</label>
            <label class="radio-option"><input type="radio" name="deposito" value="80" onchange="calculate()"> Fora da área (Alcançou) [80]</label>
            <label class="radio-option"><input type="radio" name="deposito" value="0" onchange="calculate()" checked> Não entregue [0]</label>
        </div>
    </div>

    <div class="section">
        <span class="section-title">Bônus e Tempo</span>
        <div class="row">
            <label>Bônus Local 1 Vermelho (+50)</label>
            <input type="checkbox" id="bonus1" onchange="calculate()">
        </div>
        <div class="row" style="margin-bottom: 15px;">
            <label>Bônus Local 2 Azul (+100)</label>
            <input type="checkbox" id="bonus2" onchange="calculate()">
        </div>
        <div class="row" style="background: #fff1f2; padding: 10px; border-radius: 8px; border: 1px solid #fecaca;">
            <label style="font-weight: bold; color: #991b1b;">Tempo (segundos):</label>
            <input type="number" id="tempo-input" placeholder="Ex: 115" style="width: 70px; padding: 5px; border: 1px solid #dc2626; border-radius: 4px;">
        </div>
    </div>

    <div class="total-box">
        PONTUAÇÃO ATUAL
        <span id="total" class="total-points">0</span>
    </div>

    <button onclick="salvarPontuacao()" style="width: 100%; padding: 15px; background: #16a34a; color: white; border: none; border-radius: 8px; font-weight: bold; margin-top: 15px; cursor: pointer; font-size: 1.1rem;">REGISTRAR PONTUAÇÃO</button>
    
    <button class="btn-reset" onclick="resetForm()">Limpar Campos</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
<script src="js/script.js"></script>

</body>
</html>
